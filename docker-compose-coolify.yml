version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: telegram-multi-instance-manager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_multi_instance_manager
    volumes:
      - postgres_data:/var/lib/postgresql/data

  telegram-multi-instance-manager:
    image: armandocastro/telegram-multi-instance-manager:latest
    container_name: telegram-multi-instance-manager
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - SERVICE_URL_MTG_3000
      - PUBLIC_URL=$SERVICE_URL_MTG
      # Use the db service name to connect from the Node.js container
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/telegram_multi_instance_manager?schema=public
      - ACCESS_TOKEN=change_me_to_a_strong_secret
      - TELEGRAM_API_ID=
      - TELEGRAM_API_HASH=
      - API_LOGS_RETENTION_DAYS=30
      - WEBHOOK_LOGS_RETENTION_DAYS=30

volumes:
  postgres_data:
