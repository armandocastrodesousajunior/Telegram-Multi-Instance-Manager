version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hot-telegram-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hot_telegram
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  hot-telegram:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: hot-telegram
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      # Use the db service name to connect from the Node.js container
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/hot_telegram?schema=public
      - ACCESS_TOKEN=change_me_to_a_strong_secret
      - TELEGRAM_API_ID=
      - TELEGRAM_API_HASH=
      - API_LOGS_RETENTION_DAYS=30
      - WEBHOOK_LOGS_RETENTION_DAYS=30

volumes:
  postgres_data:
