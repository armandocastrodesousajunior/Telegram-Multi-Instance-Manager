version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: telegram-multi-instance-manager-db
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: telegram_multi_instance_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  telegram-multi-instance-manager:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: telegram-multi-instance-manager
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - PUBLIC_URL=http://localhost:3000
      # Use the db service name to connect from the Node.js container
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/telegram_multi_instance_manager?schema=public&connection_limit=200&pool_timeout=50
      - ACCESS_TOKEN=change_me_to_a_strong_secret
      - TELEGRAM_API_ID=
      - TELEGRAM_API_HASH=
      - API_LOGS_RETENTION_DAYS=30
      - WEBHOOK_LOGS_RETENTION_DAYS=30

volumes:
  postgres_data:
